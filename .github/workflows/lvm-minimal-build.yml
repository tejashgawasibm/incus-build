# .github/workflows/test-incus-runner.yml
name: Test Incus Runner

on:
  workflow_dispatch:
  push:
    branches: [feat/incus]

jobs:
  test-incus-ppc64le:
    runs-on: [self-hosted, incus, ppc64le, ubuntu-22.04, lvm-back]
    
    steps:
      - name: Runner Info
        run: |
          echo "🎉 Running on Incus container!"
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          uname -a
          
      - name: Check Runner Version
        run: |
          cd ~/actions-runner
          ./bin/Runner.Listener --version
          
      - name: Check Docker
        run: |
          docker --version
          docker ps
          
      - name: Check Storage
        run: |
          echo "=== Filesystem Info ==="
          df -h
          
          echo ""
          echo "=== Storage Type ==="
          # Check for LVM block device (Incus LVM)
          if mount | grep -q '/dev/dm-'; then
            echo "✅ Using LVM block device storage"
            mount | grep '/dev/dm-'
            echo ""
            echo "Root device:"
            findmnt -n -o SOURCE /
          # Check for overlay (Docker/Podman)
          elif mount | grep -q 'overlay'; then
            echo "✅ Using overlay filesystem"
            mount | grep overlay
          # Check for directory storage
          else
            echo "✅ Using directory-based storage"
            mount | grep ' / '
          fi
          
          echo ""
          echo "=== Storage Backend Info ==="
          # Show LVM info if available
          if command -v lvs >/dev/null 2>&1; then
            echo "LVM Logical Volumes:"
            sudo lvs 2>/dev/null || echo "No LVM volumes accessible"
          fi
          
      - name: Network Test
        run: |
          echo "=== Network Connectivity ==="
          ping -c 3 8.8.8.8
          
          echo ""
          echo "=== HTTPS Connectivity ==="
          curl -I https://github.com
          
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Build Test
        run: |
          echo "🔨 Building on ppc64le with Incus LVM storage..."
          echo "Architecture: $(uname -m)"
          echo "Storage: LVM thin provisioning"
          # Your build commands here
          
      - name: Success
        run: |
          echo "✅ Incus runner on ppc64le working perfectly!"
          echo "✅ LVM storage verified"
          echo "✅ All tests passed"
